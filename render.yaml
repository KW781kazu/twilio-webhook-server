services:
  - type: web
    name: twilio-webhook-server
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
    secretFiles:
      - name: credentials.json
        mountPath: /etc/secrets/credentials.json


